repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: dprint
        name: dprint fmt
        entry: dprint fmt
        language: system
        pass_filenames: false
        files: '\.(md|toml)$'

      - id: lake-build
        name: lake build
        entry: lake build
        language: system
        pass_filenames: false
        files: '\.(lean|toml)$'
